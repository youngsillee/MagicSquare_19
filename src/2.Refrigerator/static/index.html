<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>냉장고 재료 인식 — 1단계</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4d;
      --text: #e7eef7;
      --muted: #8fa3b8;
      --accent: #3d9cf5;
      --danger: #f07178;
      --ok: #7fd99a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: 40rem;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.5rem; }
    p.lead { color: var(--muted); margin: 0 0 1.25rem; font-size: 0.95rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    label.file-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 8rem;
      border: 2px dashed var(--border);
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s;
    }
    label.file-label:hover, label.file-label:focus-within {
      border-color: var(--accent);
      color: var(--text);
    }
    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
    .preview-wrap {
      margin-top: 1rem;
      text-align: center;
    }
    .preview-wrap img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    button.primary {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.secondary {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.5rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }
    .error { color: var(--danger); font-size: 0.9rem; margin-top: 0.75rem; }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem; }
    .tag {
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.85rem;
      background: #243044;
      border: 1px solid var(--border);
    }
    .tag[data-c="high"] { border-color: #3d7a52; }
    .tag[data-c="medium"] { border-color: #6b5a2a; }
    .tag[data-c="low"] { border-color: #5a3d3d; }
    .loading { color: var(--muted); }
    footer { margin-top: 2rem; font-size: 0.8rem; color: var(--muted); }
    nav.app-nav {
      display: flex; gap: 1rem; flex-wrap: wrap; padding: 0.75rem 1rem;
      background: #151c24; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    nav.app-nav a { color: var(--accent); text-decoration: none; }
    nav.app-nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="app-nav" aria-label="주요 메뉴">
    <a href="/">1단계 · 재료 인식</a>
    <a href="/recipes.html">3단계 · 계정·저장 레시피</a>
  </nav>
  <main>
    <h1>냉장고 재료 인식</h1>
    <p class="lead">사진을 올리면 AI가 보이는 식재료를 추려 줍니다. 결과는 참고용입니다.</p>

    <div class="card">
      <label class="file-label" for="file-input" tabindex="0">
        <span>이미지 선택 (JPEG · PNG · WebP, 최대 10MB)</span>
        <span style="font-size:0.85rem;">또는 이 영역을 클릭</span>
      </label>
      <input id="file-input" type="file" accept="image/jpeg,image/png,image/webp" />
      <div class="preview-wrap" id="preview-wrap" hidden>
        <img id="preview" alt="미리보기" />
      </div>
      <button type="button" class="primary" id="btn-run" disabled>재료 인식하기</button>
      <button type="button" class="secondary" id="btn-clear" hidden>다른 사진으로 바꾸기</button>
      <p class="hint" id="client-hint"></p>
      <p class="error" id="client-error" hidden></p>
    </div>

    <div class="card" id="result-card" hidden>
      <h2 style="font-size:1rem;margin:0 0 0.5rem;">인식 결과</h2>
      <div id="result-empty" class="loading" hidden></div>
      <div class="tags" id="result-tags"></div>
      <p id="raw-summary" style="margin-top:0.75rem;font-size:0.9rem;color:var(--muted);"></p>
    </div>

    <footer id="app-footer">
      1단계 전용 · API 키는 서버에서만 사용됩니다 · 모델: …
    </footer>
  </main>

  <script>
    const MAX_BYTES = 10 * 1024 * 1024;
    const ACCEPT = ["image/jpeg", "image/png", "image/webp"];

    const fileInput = document.getElementById("file-input");
    const previewWrap = document.getElementById("preview-wrap");
    const preview = document.getElementById("preview");
    const btnRun = document.getElementById("btn-run");
    const btnClear = document.getElementById("btn-clear");
    const clientHint = document.getElementById("client-hint");
    const clientError = document.getElementById("client-error");
    const resultCard = document.getElementById("result-card");
    const resultTags = document.getElementById("result-tags");
    const resultEmpty = document.getElementById("result-empty");
    const rawSummary = document.getElementById("raw-summary");
    const appFooter = document.getElementById("app-footer");

    let selectedFile = null;
    let objectUrl = null;

    function showClientError(msg) {
      clientError.textContent = msg;
      clientError.hidden = !msg;
    }

    function resetPreview() {
      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = null;
      preview.removeAttribute("src");
      previewWrap.hidden = true;
      selectedFile = null;
      btnRun.disabled = true;
      btnClear.hidden = true;
      clientHint.textContent = "";
      showClientError("");
      resultCard.hidden = true;
    }

    fileInput.addEventListener("change", () => {
      showClientError("");
      const f = fileInput.files && fileInput.files[0];
      if (!f) {
        resetPreview();
        return;
      }
      if (!ACCEPT.includes(f.type)) {
        resetPreview();
        showClientError("JPEG, PNG, WebP만 선택할 수 있습니다.");
        return;
      }
      if (f.size > MAX_BYTES) {
        resetPreview();
        showClientError("파일이 10MB를 초과합니다.");
        return;
      }
      selectedFile = f;
      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = URL.createObjectURL(f);
      preview.src = objectUrl;
      previewWrap.hidden = false;
      btnRun.disabled = false;
      btnClear.hidden = false;
      clientHint.textContent = f.name + " · " + (f.size / 1024).toFixed(0) + " KB";
    });

    btnClear.addEventListener("click", () => {
      fileInput.value = "";
      resetPreview();
    });

    btnRun.addEventListener("click", async () => {
      if (!selectedFile) return;
      showClientError("");
      btnRun.disabled = true;
      btnRun.textContent = "분석 중…";
      resultCard.hidden = false;
      resultTags.innerHTML = "";
      resultEmpty.hidden = false;
      resultEmpty.textContent = "모델에 요청 중입니다.";
      rawSummary.textContent = "";

      const fd = new FormData();
      fd.append("file", selectedFile);

      try {
        const res = await fetch("/api/recognize", { method: "POST", body: fd });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const msg = data.error || data.detail || "요청에 실패했습니다.";
          showClientError(typeof msg === "string" ? msg : JSON.stringify(msg));
          resultEmpty.textContent = "";
          resultEmpty.hidden = true;
          btnRun.disabled = false;
          btnRun.textContent = "재료 인식하기";
          return;
        }

        resultEmpty.hidden = true;
        const items = data.ingredients || [];
        if (items.length === 0) {
          resultEmpty.hidden = false;
          resultEmpty.textContent = data.empty_message || "식별된 재료가 없습니다.";
        }
        items.forEach((ing) => {
          const span = document.createElement("span");
          span.className = "tag";
          span.dataset.c = ing.confidence || "medium";
          let t = ing.name;
          if (ing.note) t += " — " + ing.note;
          span.textContent = t;
          resultTags.appendChild(span);
        });
        if (data.raw_summary) {
          rawSummary.textContent = data.raw_summary;
        }
      } catch (e) {
        showClientError("네트워크 오류입니다. 서버가 실행 중인지 확인하세요.");
        resultEmpty.hidden = true;
      }
      btnRun.disabled = false;
      btnRun.textContent = "재료 인식하기";
    });

    document.querySelector(".file-label").addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        fileInput.click();
      }
    });

    (async function loadServerConfig() {
      try {
        const res = await fetch("/api/config");
        if (!res.ok) throw new Error("bad status");
        const cfg = await res.json();
        const m = cfg.vision_model || "(알 수 없음)";
        appFooter.textContent =
          "1단계 전용 · API 키는 서버에서만 사용됩니다 · 모델: " + m +
          " · .env의 OPENROUTER_VISION_MODEL로 변경 후 서버 재시작";
      } catch (_) {
        appFooter.textContent =
          "1단계 전용 · 서버 설정을 불러오지 못했습니다. " +
          "`python -m uvicorn app.main:app --host 127.0.0.1 --port 8000` 실행 뒤 " +
          "브라우저 주소를 http://127.0.0.1:8000 처럼 서버 URL로 열었는지 확인하세요. " +
          "(파일을 직접 연 file:// 이면 API 호출이 막힙니다.)";
      }
    })();
  </script>
</body>
</html>
